name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3). Leave empty to auto-calculate.'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate version
        if: inputs.version != ''
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in X.Y.Z format (e.g. 1.2.3), got: ${{ inputs.version }}"
            exit 1
          fi

      - name: Get version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(npx --no-install git-cliff --bumped-version | sed 's/^v//')" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        run: npx --no-install git-cliff --tag v${{ steps.version.outputs.version }} -o CHANGELOG.md

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Generate release notes
        id: release_notes
        env:
          GITHUB_RELEASE: 'true'
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          npx --no-install git-cliff --unreleased --strip all >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump version in package.json
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --workspaces --include-workspace-root

      - name: Commit and tag
        run: |
          git add .
          git commit -m 'chore: release v${{ steps.version.outputs.version }}'
          git tag v${{ steps.version.outputs.version }}
          git push origin master
          git push origin v${{ steps.version.outputs.version }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --title "${{ steps.version.outputs.version }}" \
            --notes "${{ steps.release_notes.outputs.notes }}"
